name: fasttransfer

services:
  postgres:
    image: postgres:17-alpine
    container_name: fasttransfer-postgres
    environment:
      POSTGRES_DB: fasttransfer
      POSTGRES_USER: fasttransfer
      POSTGRES_PASSWORD: fasttransfer_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fasttransfer -d fasttransfer"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: quay.io/minio/minio:latest
    container_name: fasttransfer-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: fasttransfer
      MINIO_ROOT_PASSWORD: fasttransfer_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  redis:
    image: redis:7-alpine
    container_name: fasttransfer-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:
  redis-data:
